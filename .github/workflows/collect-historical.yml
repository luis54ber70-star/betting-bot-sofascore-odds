name: Collect Historical Data (Sofascore)

on:
  schedule:
    - cron: '0 3 * * *'    # Cada día a las 3:00 AM UTC
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run historical scraper
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m src.collect_historical

      - name: Commit and push new data
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/matches.csv
          git commit -m "Update historical data $(date)" || echo "No changes"
          git push
