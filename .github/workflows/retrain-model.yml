name: Retrain ML Model (diario)

on:
  schedule:
    - cron: '0 4 * * *'    # 4:00 AM después del collect
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Retrain model
        run: python src/retrain_model.py

      - name: Commit new model
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add models/best_model.pkl
          git commit -m "Retrained model $(date)" || echo "No changes"
          git push
