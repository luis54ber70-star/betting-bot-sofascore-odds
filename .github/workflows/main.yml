name: Betting Bot Full Pipeline

on:
  schedule:
    # Se ejecuta cada hora, del minuto 0, entre las 12:00 UTC y las 01:00 UTC del día siguiente
    # Esto cubre el horario que definiste de forma más limpia.
    - cron: '0 12-23,0-1 * * *'
  workflow_dispatch:

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Entrenamiento (Podemos condicionarlo para que no corra cada hora y ahorre tiempo)
      - name: Bootstrap Data & Retrain Model
        env:
          PYTHONPATH: ${{ github.workspace }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python convertir_datos.py
          python -m src.retrain_model

      # Live Scanner (Aquí es donde se envían las alertas)
      - name: Run Live Scanner
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }} # <--- ¡IMPORTANTE!
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m src.live_scanner

      # Solo hacemos Push si hubo cambios reales en el modelo
      - name: Push Model & Data
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/matches.csv models/best_model.pkl || true
          git commit -m "Update model and data $(date)" && git push || echo "No changes to commit"
