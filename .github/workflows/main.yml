name: Betting Bot Full Pipeline
on:
  schedule:
    - cron: '0 13-23,0-2 * * *'
  workflow_dispatch:

jobs:
  build_and_run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Bootstrap Data & Retrain Model
        if: github.event_name == 'schedule' && github.event.schedule == '0 13 * * *'
        env:
          PYTHONPATH: ${{ github.workspace }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python convertir_datos.py
          python -m src.retrain_model

      - name: Push Model & Data
        if: github.event_name == 'schedule' && github.event.schedule == '0 13 * * *'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/matches.csv models/best_model.pkl || true
          git commit -m "Update model and data $(date)" || echo "No changes"
          git push || echo "Nothing to push"

      - name: Run Live Scanner
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m src.live_scanner

      # === INTEGRACIÓN GROK WITH AWK ===
      - name: Grok with AWK - Process Scanner Output
        uses: norwd/grawk@v1.1.0
        with:
          program: |
            /VALUE PICK/ || /Edge:/ {
                print $0
            }
            /Picks encontrados/ {
                print "\n=== RESUMEN GROK + AWK ==="
                print $0
            }
            END {
                print "Procesamiento AWK completado a las " strftime("%H:%M:%S")
            }
