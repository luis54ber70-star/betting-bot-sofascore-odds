name: Betting Bot Full Pipeline

on:
  schedule:
    - cron: '0 12 * * *'    # 7:00 AM México
    - cron: '0 13 * * *'    # 8:00 AM
    - cron: '0 14 * * *'    # 9:00 AM
    - cron: '0 15 * * *'    # 10:00 AM
    - cron: '0 16 * * *'    # 11:00 AM
    - cron: '0 17 * * *'    # 12:00 PM
    - cron: '0 18 * * *'    # 1:00 PM
    - cron: '0 19 * * *'    # 2:00 PM
    - cron: '0 20 * * *'    # 3:00 PM
    - cron: '0 21 * * *'    # 4:00 PM
    - cron: '0 22 * * *'    # 5:00 PM
    - cron: '0 23 * * *'    # 6:00 PM
    - cron: '0 0 * * *'     # 7:00 PM
    - cron: '0 1 * * *'     # 8:00 PM
  workflow_dispatch:

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Bootstrap + Entrenamiento (una vez al día)
      - name: Bootstrap Data & Retrain Model
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python convertir_datos.py
          python -m src.retrain_model

      # Push Model y Datos
      - name: Push Model & Data
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          if [ -f "models/best_model.pkl" ]; then
            git add data/matches.csv models/best_model.pkl
            git commit -m "Update model and data $(date)" || echo "No changes"
            git push
          fi

      # Live Scanner cada hora (7AM - 8PM)
      - name: Run Live Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m src.live_scanner
