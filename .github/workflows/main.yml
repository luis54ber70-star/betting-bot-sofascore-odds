name: Betting Bot Full Pipeline

on:
  schedule:
    - cron: '0 3 * * *'    # Recolección diaria
    - cron: '0 4 * * *'    # Entrenamiento diario
    - cron: '0 * * * *'    # Scanner cada hora
  workflow_dispatch:       # Botón manual para arreglar todo

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- PASO 1: CONVERSIÓN DE DATOS (Usa el archivo que subiste) ---
      - name: Bootstrap Data
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python convertir_datos.py

      # --- PASO 2: RECOLECCIÓN (Diaria o manual) ---
      - name: Collect Data
        if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m src.collect_historical

      - name: Push Data
        if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/matches.csv
          git commit -m "Update data $(date)" || echo "No changes"
          git push

      # --- PASO 3: ENTRENAMIENTO (Genera el modelo .pkl) ---
      - name: Retrain Model
        if: github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m src.retrain_model

      - name: Push Model
        if: github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -f "models/best_model.pkl" ]; then
            git add models/best_model.pkl
            git commit -m "New model version $(date)" || echo "No changes"
            git push
          fi

      # --- PASO 4: LIVE SCANNER (Picks a Telegram) ---
      - name: Run Live Scanner
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m src.live_scanner
